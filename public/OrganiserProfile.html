<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Organiser Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script>
        $(document).ready(function(){
            $("#emailid").val(localStorage.getItem("activeUser")).attr("readonly",true);

            $("#Fetch").click(function(){
                let email=$("#emailid").val();
                let obj={
                    type:"get",
                    url:"/FetchDetails",
                    data:{
                        email:email
                    }
                }
                $.ajax(obj).done(function(responseAry){
                    if(responseAry.length==0)
                    {
                        alert("Invalid Id");
                        return;
                    }
                    else{
                        alert(JSON.stringify(responseAry));
                        $("#organisation").val(responseAry[0].organisation);
                        $("#contact").val(responseAry[0].contact);
                        $("#address").val(responseAry[0].address);
                        $("#city").val(responseAry[0].city);
                        $("#proof").val(responseAry[0].proof);
                        $("#prev").prop("src",responseAry[0].ppic);
                        $("#sports").val(responseAry[0].sports);
                        $("#hosted").val(responseAry[0].hosted);
                        $("#web").val(responseAry[0].web);
                    }
                }).fail(function(err){
                    alert(err);
                })
            });
        });
    </script>
    <style>
        .row1{
            display: flex;
            justify-content: space-between;
            align-items: end;
        }
        .row2,.row3,.row4,.row5{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #prev{
            border: 1px solid black;
            height: 100px;
            width: 100px;
        }
    </style>
    <script>
        function preview() {
            prev.src=URL.createObjectURL(event.target.files[0]);
        }
    </script>
</head>
<body>
    <div class="container">
        <br><br>
        <form class="row g-3" method="post" enctype="multipart/form-data">
            <div class="row">
                <h1>Organiser Profile</h1>
            </div>
            <div class="row1">
                <div class="col-md-6">
                    <label for="emailid" class="form-label">Email</label>
                    <input type="email" class="form-control" id="emailid" name="emailid">
                </div>
                <div class="col-md-5">
                    <input type="button" id="Fetch" name="Fetch" class="btn btn-primary" value="Fetch">
                </div>
            </div>
            <div class="row2">
                <div class="col-md-6">
                    <label for="organisation" class="form-label">Organisation</label>
                    <input type="text" class="form-control" id="organisation" name="organisation">
                </div>
                <div class="col-md-5">
                    <label for="contact" class="form-label">Representative Contact number</label>
                    <input type="text" class="form-control" id="contact" name="contact">
                </div>
            </div>
            <div class="row3">
                <div class="col-md-6">
                    <label for="address" class="form-label">Address</label>
                    <input type="text" class="form-control" id="address" name="address" placeholder="1234 Main St">
                </div>
                <div class="col-md-5">
                    <label for="city" class="form-label">City</label>
                    <input type="text" class="form-control" id="city" name="city">
                </div>
            </div>
            <div class="row4">
                <div class="col-md-2">
                    <label for="proof" class="form-label">ID proof</label>
                    <select id="proof" class="form-select" name="proof">
                      <option selected>choose</option>
                      <option value="certificate">Reg. Certificate</option>
                      <option value="aadhaar">aadhaar card</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="doc" class="form-label">Upload Doc</label>
                    <input class="form-control" accept="image/*" type="file" id="doc" name="doc" onchange="preview();">
                  </div>
                <div class="col-md-4">
                    <div>
                        <img src="" id="prev" alt="" width="100" height="100">
                    </div>
                </div>
            </div>
            <div class="row5">
                <div class="col-md-6">
                    <label for="sports" class="form-label">Deals</label>
                    <select name="sports" id="sports" class="form-select" multiple>
                        <option disabled>choose</option>
                        <option value="cricket">Cricket</option>
                        <option value="football">Football</option>
                        <option value="hockey">Hockey</option>
                        <option value="badminton">Badminton</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="hosted" class="form-label">Previous Tournaments Hosted</label>
                    <textarea class="form-control" id="hosted" name="hosted" rows="3" cols="60"></textarea>
                </div>
            </div>
            <div class="row6">
                <div class="col-md-6">
                    <label for="web" class="form-label">Website</label>
                    <input type="text" class="form-control" id="web" name="web">
                </div>                  
            </div>
            <div class="row7">
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="gridCheck">
                        <label class="form-check-label" for="gridCheck">
                            Check me out
                        </label>
                    </div>
              </div>
            </div>
            <div class="col-12">
                <center>
                    <input type="submit" formaction="save" class="btn btn-primary" value="Save">&nbsp;&nbsp;&nbsp;
                    <input type="submit" formaction="update" class="btn btn-primary" value="Update">
                </center>
            </div>
          </form>
          <br><br><br>
    </div>
</body>
</html>
