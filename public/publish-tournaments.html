<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Publish-Tournaments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <style>
    .row2,.row3{
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="container">
    <center>
      <h1>Publish Tournaments</h1>
    </center>
    <form method="post" enctype="multipart/form-data" class="row g-3">
      <div class="row0">
        <div class="col-md-8">
          <label for="tournaments" class="form-label">Tournaments</label>
          <input type="text" class="form-control" name="tournaments" id="tournaments">
        </div>
      </div>
      <div class="row1">
        <div class="col-md-8">
          <label for="emailid" class="form-label">Email(NGO)</label>
          <input type="email" class="form-control" name="emailid" id="emailid">
        </div>
      </div>
      <div class="row2">
        <div class="col-md-4">
          <label for="game" class="form-label">Game</label>
          <input type="text" class="form-control" id="game" name="game">
        </div>
        <div class="col-md-4">
          <label for="title" class="form-label">Title</label>
          <input type="text" class="form-control" id="title" name="title">
        </div>
        <div class="col-md-2">
          <label for="entryfee" class="form-label">Entry Fee</label>
          <input type="text" class="form-control" id="entryfee" name="entryfee">
        </div>
      </div>
      <div class="row3">
        <div class="col-md-3">
          <label for="date" class="form-label">Date</label>
          <input type="date" class="form-control" id="date" name="date">
        </div>
        <div class="col-md-4">
          <label for="city" class="form-label">City</label>
          <input type="text" class="form-control" id="city" name="city">
        </div>
        <div class="col-md-4">
          <label for="location" class="form-label">Location</label>
          <input type="text" class="form-control" id="location" name="location">
        </div>
      </div>
      <div class="row4">
        <div class="col-12">
          <label for="prizes" class="form-label">Prizes</label>
          <input type="text" class="form-control" id="prizes" name="prizes">
        </div>
      </div>
      <div class="row5">
        <div class="col-md-4">
          <label for="poster" class="form-label">Poster</label>
          <input type="file" accept="image/*" class="form-control" id="poster" name="poster">
        </div>
      </div>
      <div class="row6">
        <label for="info" class="form-label">Other Info</label>
        <div class="form-floating">
          <textarea class="form-control" placeholder="Leave a comment here" name="info" id="info" style="height: 100px"></textarea>
          <label for="info">Comments</label>
        </div>
      </div>
      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="gridCheck">
          <label class="form-check-label" for="gridCheck">
            Check me out
          </label>
        </div>
      </div>
      <div class="col-12">
        <button type="submit" formaction="upload-tournaments" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</body>
</html>
