    <script>
        $(document).ready(function () {
            $("#SignUp").click(function () {
                if (
                    $("#txtEmail").val() == "" ||
                    $("#txtPwd").val() == "" ||
                    $("#utype").val() == "Select"
                ) {
                    alert("Fill Details");
                } else {
                    let email = $("#txtEmail").val();
                    let pwd = $("#txtPwd").val();
                    let user = $("#utype").val();
                    let obj2 = {
                        type: "get",
                        url: "/SignUP",
                        data: {
                            txtEmail: email,
                            txtPwd: pwd,
                            utype: user,
                        },
                    };
                    $.ajax(obj2)
                        .done(function (response) {
                            alert(response);
                        })
                        .fail(function (err) {
                            alert("Server Error");
                        });
                    let obj3 = {
                        type: "get",
                        url: "/SendMail",
                        data: {
                            Email: email
                        },
                    };
                    $.ajax(obj3)
                        .done(function (response) {
                            /*alert(response);*/
                        })
                        .fail(function (err) {
                            alert("Server Error");
                        });
                }
                //-----
            });
            $("#txtEmail").blur(function () {
                let email = $("#txtEmail").val();
                let obj1 = {
                    type: "get",
                    url: "/check-user-SignUp",
                    data: {
                        txtEmail: email,
                    },
                };
                $.ajax(obj1)
                    .done(function (response) {
                        if (response == "Already Exist") {
                            alert(response);
                            $("#SignUp").prop("disabled", true);
                        } else {
                            $("#SignUp").prop("disabled", false);
                        }
                    })
                    .fail(function (err) {
                        alert("Server Error");
                    });
            });
            $("#txtEmail").keyup(function () {
                let email = $("#txtEmail").val();
                let exp = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                let response = exp.test(email);
                if (response == true) {
                    $(".errorEmail")
                        .html("valid")
                        .addClass("valid")
                        .removeClass("invalid");
                } else {
                    $(".errorEmail")
                        .html("Invalid")
                        .addClass("invalid")
                        .removeClass("valid");
                }
            });
            $("#txtPwd").keyup(function () {
                let password = $("#txtPwd").val();
                let pwd = /((?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W]).{6,15})/;
                let response = pwd.test(password);
                if (response == true) {
                    $(".errorPwd")
                        .html("STRONG")
                        .addClass("valid")
                        .removeClass("invalid");
                } else {
                    $(".errorPwd")
                        .html("WEAK")
                        .addClass("invalid")
                        .removeClass("valid");
                }
            });
            $("#button-addon1").mousedown(function () {
                $("#txtPwd").prop("type", "text");
                $("#eye1").addClass("fa-eye-slash").removeClass("fa-eye");
            });

            $("#button-addon1").mouseup(function () {
                $("#txtPwd").prop("type", "password");
                $("#eye1").addClass("fa-eye").removeClass("fa-eye-slash");
            });
            $("#button-addon2").mousedown(function () {
                $("#LoginPwd").prop("type", "text");
                $("#eye2").addClass("fa-eye-slash").removeClass("fa-eye");
            });

            $("#button-addon2").mouseup(function () {
                $("#LoginPwd").prop("type", "password");
                $("#eye2").addClass("fa-eye").removeClass("fa-eye-slash");
            });
            $("#login").click(function () {
                let email = $("#LoginEmail").val();
                let pwd = $("#LoginPwd").val();
                if (email == "" || (pwd = "")) {
                    alert("Please Fill Up Details");
                } else {
                    let email = $("#LoginEmail").val();
                    let pwd = $("#LoginPwd").val();
                    let obj1 = {
                        type: "get",
                        url: "/login",
                        data: {
                            LoginEmail: email,
                            LoginPwd: pwd,
                        },
                    };
                    $.ajax(obj1)
                        .done(function (response) {
                            /*alert(response);*/
                        })
                        .fail(function (err) {
                            alert("Server Error");
                        });
                    let obj2 = {
                        type: "get",
                        url: "/checkUser",
                        data: {
                            LoginEmail: email,
                            LoginPwd: pwd,
                        },
                    };
                    $.ajax(obj2)
                        .done(function (response) {
                            alert(response);
                            if (response == "Organiser") {
                                location.href = "dashOrganiser.html";
                                localStorage.setItem("activeUser", email);
                            } else if (response == "Player") {
                                location.href = "dashPlayer.html";
                                localStorage.setItem("activeUser", email);
                            } else {
                                alert("invalid credentials");
                            }
                        })
                        .fail(function (err) {
                            alert(err);
                        });
                    let obj3 = {
                        type: "get",
                        url: "/SendMail",
                        data: {
                            Email: email
                        },
                    };
                    $.ajax(obj3)
                        .done(function (response) {
                            alert(response);
                        })
                        .fail(function (err) {
                            alert("Server Error");
                        });
                }
            });
        });
    </script>
